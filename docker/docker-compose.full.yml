services:
  # Infrastructure
  postgres:
    image: postgres:16-alpine
    container_name: shipsec-postgres
    environment:
      POSTGRES_USER: shipsec
      POSTGRES_PASSWORD: shipsec
      POSTGRES_DB: shipsec
      POSTGRES_MULTIPLE_DATABASES: temporal
    # Internal only - no direct port access in production
    expose:
      - '5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U shipsec']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  temporal:
    image: temporalio/auto-setup:latest
    container_name: shipsec-temporal
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - DB_NAME=temporal
      - POSTGRES_USER=shipsec
      - POSTGRES_PWD=shipsec
      - POSTGRES_SEEDS=postgres
      - AUTO_SETUP=true
    expose:
      - '7233'
    volumes:
      - temporal_data:/var/lib/temporal
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'tctl --address $(hostname -i):7233 cluster health']
      interval: 30s
      timeout: 10s
      retries: 5

  temporal-ui:
    image: temporalio/ui:latest
    container_name: shipsec-temporal-ui
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_NAMESPACE=default
    expose:
      - '8080'
    depends_on:
      - temporal
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-sf', 'http://localhost:8080']
      interval: 30s
      timeout: 10s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-10-02T17-50-41Z
    container_name: shipsec-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    expose:
      - '9000'
      - '9001'
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 10s
      retries: 5

  loki:
    image: grafana/loki:3.2.1
    container_name: shipsec-loki
    command: -config.file=/etc/loki/local-config.yaml
    expose:
      - '3100'
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/local-config.yaml
      - loki_data:/loki
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3100/ready']
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    image: redis:latest
    container_name: shipsec-redis
    expose:
      - '6379'
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 30s
      timeout: 10s
      retries: 5

  redpanda:
    image: redpandadata/redpanda:v24.2.5
    container_name: shipsec-redpanda
    command:
      - redpanda
      - start
      - --mode=dev-container
      - --smp=1
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --advertise-kafka-addr=redpanda:9092
    expose:
      - '9092'
      - '9644'
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9644/v1/status/ready']
      interval: 30s
      timeout: 10s
      retries: 5

  redpanda-console:
    image: redpandadata/console:v2.7.2
    container_name: shipsec-redpanda-console
    depends_on:
      - redpanda
    environment:
      CONFIG_FILEPATH: /etc/redpanda/console-config.yaml
    expose:
      - '8080'
    volumes:
      - ./redpanda-console-config.yaml:/etc/redpanda/console-config.yaml:ro
    restart: unless-stopped

  opensearch:
    image: opensearchproject/opensearch:2.11.1
    container_name: shipsec-opensearch
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - 'OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m'
      - DISABLE_SECURITY_PLUGIN=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    expose:
      - '9200'
      - '9600'
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:9200/_cluster/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5

  opensearch-dashboards:
    build:
      context: .
      dockerfile: opensearch-dashboards.Dockerfile
    image: shipsec-opensearch-dashboards:2.11.1
    container_name: shipsec-opensearch-dashboards
    depends_on:
      opensearch:
        condition: service_healthy
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    expose:
      - '5601'
    volumes:
      - ./opensearch-dashboards.yml:/usr/share/opensearch-dashboards/config/opensearch_dashboards.yml:ro
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:5601/analytics/api/status || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5

  opensearch-init:
    image: curlimages/curl:8.5.0
    container_name: shipsec-opensearch-init
    depends_on:
      opensearch-dashboards:
        condition: service_healthy
    volumes:
      - ./opensearch-init.sh:/init.sh:ro
    entrypoint: ['/bin/sh', '/init.sh']
    restart: 'no'

  # Applications
  dind:
    image: docker:27-dind
    container_name: shipsec-dind
    privileged: true
    command: ['--host=tcp://0.0.0.0:2375', '--storage-driver=overlay2']
    environment:
      - DOCKER_TLS_CERTDIR=
    volumes:
      - docker_data:/var/lib/docker
    healthcheck:
      test: ['CMD', 'docker', 'info']
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  backend:
    image: ghcr.io/shipsecai/studio-backend:${SHIPSEC_TAG:-latest}
    build:
      context: ..
      dockerfile: Dockerfile
      target: backend
    container_name: shipsec-backend
    environment:
      - NODE_ENV=production
      - SHIPSEC_ENV=production
      - PORT=3211
      - DATABASE_URL=postgresql://shipsec:shipsec@postgres:5432/shipsec
      - ENABLE_INGEST_SERVICES=true
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_NAMESPACE=shipsec-prod
      - TEMPORAL_TASK_QUEUE=shipsec-prod
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - LOKI_URL=http://loki:3100
      - TERMINAL_REDIS_URL=redis://redis:6379
      - LOG_KAFKA_BROKERS=redpanda:9092
      - LOG_KAFKA_TOPIC=telemetry.logs
      - LOG_KAFKA_CLIENT_ID=shipsec-backend
      - LOG_KAFKA_GROUP_ID=shipsec-backend-log-consumer
      - EVENT_KAFKA_TOPIC=telemetry.events
      - EVENT_KAFKA_CLIENT_ID=shipsec-backend-events
      - EVENT_KAFKA_GROUP_ID=shipsec-event-ingestor
      - AUTH_PROVIDER=${AUTH_PROVIDER:-local}
      - CLERK_PUBLISHABLE_KEY=${CLERK_PUBLISHABLE_KEY:-}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY:-}
      - SESSION_SECRET=${SESSION_SECRET:-}
      # Set to 'true' to disable analytics
      - DISABLE_ANALYTICS=${DISABLE_ANALYTICS:-false}
      # Internal service token for worker->backend auth
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-}
      # OpenSearch tenant provisioning
      - OPENSEARCH_SECURITY_ENABLED=${OPENSEARCH_SECURITY_ENABLED:-false}
      - OPENSEARCH_URL=http://opensearch:9200
      - OPENSEARCH_DASHBOARDS_URL=http://opensearch-dashboards:5601/analytics
      - OPENSEARCH_ADMIN_USERNAME=${OPENSEARCH_ADMIN_USERNAME:-admin}
      - OPENSEARCH_ADMIN_PASSWORD=${OPENSEARCH_ADMIN_PASSWORD:-}
    # Internal only - accessed via nginx at /api/
    expose:
      - '3211'
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: ghcr.io/shipsecai/studio-frontend:${SHIPSEC_TAG:-latest}
    build:
      context: ..
      dockerfile: Dockerfile
      target: frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost}
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://localhost}
        VITE_AUTH_PROVIDER: ${VITE_AUTH_PROVIDER:-local}
        VITE_DEFAULT_ORG_ID: ${VITE_DEFAULT_ORG_ID:-local-dev}
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY:-}
        VITE_GIT_SHA: ${GIT_SHA:-unknown}
        VITE_PUBLIC_POSTHOG_KEY: ${VITE_PUBLIC_POSTHOG_KEY:-}
        VITE_PUBLIC_POSTHOG_HOST: ${VITE_PUBLIC_POSTHOG_HOST:-}
        VITE_OPENSEARCH_DASHBOARDS_URL: ${VITE_OPENSEARCH_DASHBOARDS_URL:-/analytics}
    container_name: shipsec-frontend
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost}
      - VITE_BACKEND_URL=${VITE_BACKEND_URL:-http://localhost}
      - VITE_AUTH_PROVIDER=${VITE_AUTH_PROVIDER:-local}
      - VITE_DEFAULT_ORG_ID=${VITE_DEFAULT_ORG_ID:-local-dev}
      - VITE_CLERK_PUBLISHABLE_KEY=${VITE_CLERK_PUBLISHABLE_KEY:-}
      - VITE_OPENSEARCH_DASHBOARDS_URL=${VITE_OPENSEARCH_DASHBOARDS_URL:-/analytics}
    # Internal only - accessed via nginx at /
    expose:
      - '8080'
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-sf', 'http://localhost:8080']
      interval: 30s
      timeout: 10s
      retries: 5

  worker:
    image: ghcr.io/shipsecai/studio-worker:${SHIPSEC_TAG:-latest}
    build:
      context: ..
      dockerfile: Dockerfile
      target: worker
    container_name: shipsec-worker
    environment:
      - NODE_ENV=production
      - SHIPSEC_ENV=production
      - DATABASE_URL=postgresql://shipsec:shipsec@postgres:5432/shipsec
      - ENABLE_INGEST_SERVICES=true
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_NAMESPACE=shipsec-prod
      - TEMPORAL_TASK_QUEUE=shipsec-prod
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - LOKI_URL=http://loki:3100
      - TERMINAL_REDIS_URL=redis://redis:6379
      - DOCKER_HOST=tcp://dind:2375
      - LOG_KAFKA_BROKERS=redpanda:9092
      - LOG_KAFKA_TOPIC=telemetry.logs
      - LOG_KAFKA_CLIENT_ID=shipsec-worker
      - EVENT_KAFKA_TOPIC=telemetry.events
      - EVENT_KAFKA_CLIENT_ID=shipsec-worker-events
      # OpenSearch for Analytics Sink
      - OPENSEARCH_URL=http://opensearch:9200
      - OPENSEARCH_DASHBOARDS_URL=http://opensearch-dashboards:5601/analytics
      # Tenant provisioning (for multi-tenant security mode)
      - BACKEND_URL=http://backend:3211
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-}
      - OPENSEARCH_SECURITY_ENABLED=${OPENSEARCH_SECURITY_ENABLED:-false}
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
      minio:
        condition: service_healthy
      dind:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'node', '-e', 'process.exit(0)']
      interval: 30s
      timeout: 10s
      retries: 5

  # Nginx reverse proxy - unified entry point
  nginx:
    image: nginx:1.25-alpine
    container_name: shipsec-nginx
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_started
      opensearch-dashboards:
        condition: service_healthy
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-sf', 'http://localhost/health']
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
  minio_data:
  loki_data:
  temporal_data:
  docker_data:
  redis_data:
  redpanda_data:
  opensearch_data:

networks:
  default:
    name: shipsec-network
