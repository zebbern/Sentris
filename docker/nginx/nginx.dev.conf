worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    # Debug log format for analytics auth issues
    log_format auth_debug '$remote_addr [$time_local] "$request" $status '
                          'auth_org_id="$auth_org_id" auth_user="$auth_user_id"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/rss+xml application/atom+xml image/svg+xml;

    # =================================================================
    # DEVELOPMENT MODE - Frontend & Backend run on host via PM2
    # Uses host.docker.internal to reach host machine from container
    #
    # NOTE: These upstreams hardcode instance 0 ports (5173/3211).
    # Nginx is shared infra and always proxies to instance 0.
    # Multi-instance users (SENTRIS_INSTANCE=N where N>0) should
    # access their instance directly via its ports:
    #   Frontend: http://localhost:<5173 + N*100>
    #   Backend:  http://localhost:<3211 + N*100>
    # See docs/MULTI-INSTANCE-DEV.mdx for details.
    # =================================================================

    # Upstream definitions - pointing to host machine (PM2 services, instance 0)
    upstream frontend {
        # Vite dev server on host (instance 0)
        server host.docker.internal:5173;
        keepalive 32;
    }

    upstream backend {
        # NestJS backend on host (instance 0)
        server host.docker.internal:3211;
        keepalive 32;
    }

    # MCP sticky-session upstream (sticky-session ADR)
    # Uses consistent hashing (ketama) on the mcp_affinity cookie for
    # session affinity. In multi-instance dev mode, add additional
    # backend instances here (e.g. host.docker.internal:3311).
    upstream backend_mcp {
        hash $mcp_affinity_key consistent;
        server host.docker.internal:3211;
        keepalive 32;
    }

    # OpenSearch Dashboards runs in Docker
    upstream opensearch-dashboards {
        server opensearch-dashboards:5601;
        keepalive 32;
    }

    # WebSocket connection upgrade map
    # IMPORTANT: Use '' (empty) not 'close' for non-WebSocket requests.
    # 'close' kills upstream keepalive, forcing a new TCP connection per request
    # through Docker's networking stack — adding 10ms-3s latency per request.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' '';
    }

    # MCP session affinity key (sticky-session ADR)
    # Uses the mcp_affinity cookie set by backend MCP controllers.
    # Falls back to $remote_addr when cookie is absent so first-time
    # requests still distribute rather than all hashing to empty string.
    map $cookie_mcp_affinity $mcp_affinity_key {
        default $cookie_mcp_affinity;
        ''      $remote_addr;
    }

    server {
        listen 80;
        server_name _;

        # Client request body size (for file uploads)
        client_max_body_size 100M;
        client_body_buffer_size 10M;

        # Proxy buffer settings
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;

        # Common proxy headers
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # =================================================================
        # Auth validation endpoint (public, proxied to backend)
        # =================================================================
        location = /auth/validate {
            proxy_pass http://backend/api/v1/auth/validate;
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Authorization $http_authorization;
        }

        # =================================================================
        # Internal auth validation endpoint for auth_request
        # =================================================================
        location = /_auth {
            internal;
            # Debug: log internal auth requests
            access_log /var/log/nginx/auth_internal.log main;

            proxy_pass http://backend/api/v1/auth/validate;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
            # Pass cookies for session auth
            proxy_set_header Cookie $http_cookie;
            # Pass Authorization header for API key/token auth
            proxy_set_header Authorization $http_authorization;
        }

        # =================================================================
        # Dashboards SaaS Lockdown - Whitelist allowed app pages
        # Unwanted plugins are removed from the image (opensearch-dashboards.Dockerfile)
        # This regex is defense-in-depth against any remaining/future plugins
        # Admin: use direct Dashboards port (5601) bypassing nginx
        # =================================================================
        location ~ ^/analytics/app/(?!(discover|visualize|dashboards?|dev_tools|alerting|notifications|management|data-explorer|home)($|/|\?|#)) {
            return 403;
        }

        # =================================================================
        # OpenSearch Dashboards - /analytics/* (PROTECTED + TENANT ISOLATED)
        # =================================================================
        location /analytics/ {
            # Debug logging for auth issues
            access_log /var/log/nginx/analytics_auth.log auth_debug;

            # Require authentication before proxying
            auth_request /_auth;
            # On auth failure, redirect to login page
            error_page 401 = @auth_redirect;

            # Capture org/user context from auth response headers
            auth_request_set $auth_org_id $upstream_http_x_auth_organization_id;
            auth_request_set $auth_user_id $upstream_http_x_auth_user_id;

            # NOTE: Cannot use 'if ($auth_org_id = "")' here because nginx's 'if' runs
            # in the rewrite phase BEFORE auth_request completes in the access phase.
            # OpenSearch Security will reject requests with invalid/missing proxy auth headers.
            # For fail-closed behavior, the auth backend should return 401 if org context is missing.

            proxy_pass http://opensearch-dashboards;

            # Standard forwarding headers (must be repeated here because nginx
            # proxy_set_header in a location block overrides ALL parent-level directives)
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support for dashboards real-time features
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Timeouts for dashboards (can be slow for large queries)
            proxy_connect_timeout 60s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;

            # Dashboards-specific headers
            proxy_set_header osd-xsrf "true";

            # OpenSearch Security proxy auth headers
            # proxy_set_header REPLACES any client-supplied headers (prevents spoofing)
            proxy_set_header x-proxy-user $auth_org_id;
            proxy_set_header x-proxy-roles "customer_${auth_org_id}_ro";
            proxy_set_header securitytenant $auth_org_id;

            # Preserve cookies
            proxy_cookie_path /analytics/ /analytics/;

            # No redirect rewriting needed - we preserve the path
            proxy_redirect off;
        }

        # Auth redirect handler - redirect to home with return URL
        location @auth_redirect {
            return 302 /?returnTo=$request_uri;
        }

        # Exact match for /analytics without trailing slash
        location = /analytics {
            return 301 /analytics/;
        }

        # =================================================================
        # MCP API — sticky-session routes (sticky-session ADR)
        # These locations use the consistent-hash upstream so that all
        # requests sharing the same mcp_affinity cookie reach the same
        # backend instance. Must appear before the generic /api/v1/ block
        # so Nginx's longest-prefix match selects them.
        # =================================================================
        location /api/v1/mcp/ {
            proxy_pass http://backend_mcp/api/v1/mcp/;

            # Standard proxy headers (must be re-declared; nginx drops
            # inherited headers when any proxy_set_header is used here)
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;

            # WebSocket support for MCP streaming/SSE
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # MCP/SSE timeouts — keep connection alive for long-running streams
            proxy_connect_timeout 30s;
            proxy_send_timeout 86400s;
            proxy_read_timeout 86400s;

            # Critical for SSE: do not buffer streamed responses
            proxy_buffering off;

            # Strip backend CORS headers to avoid duplicates with nginx's own
            proxy_hide_header 'Access-Control-Allow-Origin';
            proxy_hide_header 'Access-Control-Allow-Methods';
            proxy_hide_header 'Access-Control-Allow-Headers';
            proxy_hide_header 'Access-Control-Allow-Credentials';
            proxy_hide_header 'Access-Control-Expose-Headers';

            # CORS for development (frontend at different port)
            add_header 'Access-Control-Allow-Origin' $http_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,Cookie,x-internal-token,x-organization-id,Accept' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;

            # Handle preflight
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $http_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,Cookie,x-internal-token,x-organization-id,Accept' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }
        }

        location /api/v1/studio-mcp/ {
            proxy_pass http://backend_mcp/api/v1/studio-mcp/;

            # Standard proxy headers (must be re-declared; nginx drops
            # inherited headers when any proxy_set_header is used here)
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;

            # WebSocket support for Studio-MCP streaming/SSE
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # MCP/SSE timeouts — keep connection alive for long-running streams
            proxy_connect_timeout 30s;
            proxy_send_timeout 86400s;
            proxy_read_timeout 86400s;

            # Critical for SSE: do not buffer streamed responses
            proxy_buffering off;

            # Strip backend CORS headers to avoid duplicates with nginx's own
            proxy_hide_header 'Access-Control-Allow-Origin';
            proxy_hide_header 'Access-Control-Allow-Methods';
            proxy_hide_header 'Access-Control-Allow-Headers';
            proxy_hide_header 'Access-Control-Allow-Credentials';
            proxy_hide_header 'Access-Control-Expose-Headers';

            # CORS for development (frontend at different port)
            add_header 'Access-Control-Allow-Origin' $http_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,Cookie,x-internal-token,x-organization-id,Accept' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;

            # Handle preflight
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $http_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,Cookie,x-internal-token,x-organization-id,Accept' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }
        }

        # =================================================================
        # Backend API - /api/v1/*
        # Must use /api/v1/ (not /api/) to avoid intercepting frontend
        # routes like /api-keys that start with /api but are SPA pages.
        # =================================================================
        location /api/v1/ {
            proxy_pass http://backend/api/v1/;

            # WebSocket support for terminal/streaming endpoints
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # API timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Don't buffer API responses (important for streaming)
            proxy_buffering off;

            # Strip backend CORS headers to avoid duplicates with nginx's own
            proxy_hide_header 'Access-Control-Allow-Origin';
            proxy_hide_header 'Access-Control-Allow-Methods';
            proxy_hide_header 'Access-Control-Allow-Headers';
            proxy_hide_header 'Access-Control-Allow-Credentials';
            proxy_hide_header 'Access-Control-Expose-Headers';

            # CORS for development (frontend at different port)
            add_header 'Access-Control-Allow-Origin' $http_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,Cookie,x-internal-token,x-organization-id,Accept' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;

            # Handle preflight
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $http_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,Cookie,x-internal-token,x-organization-id,Accept' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }
        }

        # =================================================================
        # Frontend (SPA) - /* (catch-all)
        # =================================================================
        location / {
            proxy_pass http://frontend/;

            # WebSocket support for Vite HMR in development
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Frontend timeouts - longer read timeout for HMR WebSocket
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 86400s;  # 24 hours - keep HMR WebSocket alive
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
